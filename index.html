<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utrux Search</title>

<style>
body{
    font-family:Tahoma,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
}

.logo{
    text-align:center;
    font-size:48px;
    font-weight:bold;
    margin-bottom:30px;
}

.search-box{
    display:flex;
    gap:10px;
    margin-bottom:30px;
}

.search-box input{
    flex:1;
    padding:15px;
    border:1px solid #ccc;
    border-radius:30px;
    font-size:18px;
}

.search-box button{
    padding:15px 25px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
}

.result{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.result a{
    font-size:20px;
    color:#1a0dab;
    text-decoration:none;
}

.result p{
    color:#444;
    margin-top:8px;
}
</style>

</head>
<body>

<div class="container">

    <div class="logo">Utrux Search</div>

    <div class="search-box">
        <input
            type="text"
            id="query"
            placeholder="هر چیزی را که میخواهید جستجو کنید..."
            onkeypress="if(event.key==='Enter') search()"
        >
        <button onclick="search()">جستجو</button>
    </div>

    <div id="results"></div>

</div>

<script>

const API_KEY = "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";
    const PEXELS_API_KEY = "LBX1wKWqpXvrZQLXA6xbDaZ376NBhcDZmPAAgBeKyFNF5FtYlpYRBeXw";

async function search(){

    const query = document.getElementById("query").value.trim();

    const pexelsResponse = await fetch(
    `https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=12`,
    {
        headers: {
            Authorization: PEXELS_API_KEY
        }
    }
);

const pexelsData = await pexelsResponse.json();

    if(!query) return;

    const resultsDiv = document.getElementById("results");

    resultsDiv.innerHTML = "<h3>در حال جستجو...</h3>";

    try{

        const response = await fetch(
            "https://api.tavily.com/search",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    api_key:API_KEY,
                    query:query,
                    max_results:10,
                    search_depth:"basic"
                })
            }
        );

        const data = await response.json();

        resultsDiv.innerHTML = "";

        if(!data.results || data.results.length===0){

            resultsDiv.innerHTML =
            "<h3>نتیجه‌ای پیدا نشد.</h3>";

            return;
        }

        const imagesDiv = document.getElementById("images");

imagesDiv.innerHTML = "<h2>تصاویر</h2>";

pexelsData.photos.forEach(photo => {

    imagesDiv.innerHTML += `
        <a href="${photo.url}" target="_blank">
            <img
                src="${photo.src.medium}"
                style="
                    width:200px;
                    height:150px;
                    object-fit:cover;
                    margin:5px;
                    border-radius:10px;
                "
            >
        </a>
    `;

});

        data.results.forEach(result=>{

            resultsDiv.innerHTML += `
                <div class="result">
                    <a href="${result.url}" target="_blank">
                        ${result.title}
                    </a>

                    <p>
                        ${result.content || ""}
                    </p>

                    <small>${result.url}</small>
                </div>
            `;

        });

    }catch(error){

        console.error(error);

        resultsDiv.innerHTML =
        "<h3>خطا در اتصال به API</h3>";
    }

}
</script>

</body>
</html>
