<!DOCTYPE html>

<html lang="fa" dir="rtl">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utrux Search</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Tahoma,sans-serif;

background:
radial-gradient(circle at center,
#1e3a8a 0%,
#081229 35%,
#020617 100%);

min-height:100vh;
color:white;
}

.container{
width:100%;
max-width:none;
padding:20px 40px;
}
  
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logo{
font-size:34px;
font-weight:bold;
}

.back-btn{
background:#2563eb;
color:white;
border:none;
padding:12px 18px;
border-radius:12px;
cursor:pointer;
}

.back-btn:hover{
background:#3b82f6;
}

.search-area{
width:100%;
padding:10px;
background:none;
backdrop-filter:none;
}

.gsc-control-cse{
width:100% !important;
}

.gsc-search-box{
width:100% !important;
}

.gsib_a{
width:100% !important;
}

.gsc-input-box{
height:55px !important;
}

</style>

<script async src="https://cse.google.com/cse.js?cx=e3f7d10c4395f4d2b"></script>

</head>
<body>

<div class="container">

<div class="topbar">

<div class="logo">
Utrux Search
</div>

<button
class="back-btn"
onclick="window.location.href='https://utruc.github.io/browser/'">

🏠 بازگشت

</button>

</div>

<div class="search-area">

<div class="gcse-search"></div>

</div>

</div>

</body>
</html>
