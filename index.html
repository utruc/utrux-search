<!DOCTYPE html>

<html lang="fa" dir="rtl">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utrux Search</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Tahoma,sans-serif;

background:
radial-gradient(circle at center,
#1e3a8a 0%,
#081229 35%,
#020617 100%);

min-height:100vh;
color:white;
}

.container{
width:100%;
max-width:none;
padding:20px 40px;
}
  
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logo{
font-size:34px;
font-weight:bold;
}

.back-btn{
background:#2563eb;
color:white;
border:none;
padding:12px 18px;
border-radius:12px;
cursor:pointer;
}

.back-btn:hover{
background:#3b82f6;
}

.search-area{
width:100%;
padding:10px;
background:none;
backdrop-filter:none;
}

.gsc-control-cse{
width:100% !important;
}

.gsc-search-box{
width:100% !important;
}

.gsib_a{
width:100% !important;
}

.gsc-input-box{
height:55px !important;
}

</style>

<script async src="https://cse.google.com/cse.js?cx=d216255c91fde429a"></script>

</head>
<body>

<div class="container">

<div class="topbar">

<div class="logo">
Utrux Search
</div>

<button
class="back-btn"
onclick="window.location.href='https://utruc.github.io/browser/'">

🏠 بازگشت

</button>

</div>

<div class="search-area">

<div class="search-area">

<input
id="searchInput"
type="text"
placeholder="جستجو در گوگل..."
style="
width:100%;
height:55px;
border:none;
border-radius:15px;
padding:0 15px;
font-size:18px;
">

</div>

</div>

</div>
<script>
if("serviceWorker" in navigator){

  navigator.serviceWorker.register("sw.js");

}
</script>
  <script>

const params =
new URLSearchParams(
window.location.search
);

const q = params.get("q");

if(q){

window.location.href =
"https://www.google.com/search?q=" +
encodeURIComponent(q);

}

document
.getElementById("searchInput")
.addEventListener(
"keydown",
function(e){

if(e.key==="Enter"){

window.location.href =
"https://www.google.com/search?q=" +
encodeURIComponent(
this.value
);

}

}
);

</script>
</body>
</html>
