<!DOCTYPE html>

<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Utrux Search</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Tahoma,sans-serif;

background:
radial-gradient(circle at center,
#1e3a8a 0%,
#081229 35%,
#020617 100%);

color:white;

min-height:100vh;

padding:30px;
}

.header{

max-width:1100px;

margin:auto;
}

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;
}

.back-btn{

background:#2563eb;

color:white;

border:none;

padding:12px 20px;

border-radius:12px;

cursor:pointer;
}

.back-btn:hover{

background:#3b82f6;
}

.search-box{

display:flex;

overflow:hidden;

border-radius:18px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

margin-bottom:30px;
}

.search-box input{

flex:1;

background:none;

border:none;

outline:none;

color:white;

padding:18px;

font-size:18px;
}

.search-box button{

width:120px;

border:none;

background:#2563eb;

color:white;

cursor:pointer;
}

.search-box button:hover{

background:#3b82f6;
}

.status{

margin-bottom:20px;

opacity:.8;
}

<div id="images"></div>

<div id="results"></div>
    
#results{

max-width:1100px;

margin:auto;
}

.result{

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

padding:20px;

margin-bottom:15px;

backdrop-filter:blur(20px);
}

.result a{

color:#60a5fa;

font-size:20px;

text-decoration:none;
}

.result p{

margin-top:10px;

line-height:1.8;

color:#dbe4f3;
}

.result small{

display:block;

margin-top:10px;

opacity:.7;
word-break:break-all;
}

.loading{

text-align:center;

padding:40px;
}

.error{

text-align:center;

padding:40px;

color:#ff9b9b;
}
#images{
max-width:1100px;
margin:auto;
margin-bottom:30px;

display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
}

#images img{
width:100%;
height:180px;
object-fit:cover;
border-radius:15px;
}
</style>

</head>
<body>

<div class="header">

<div class="topbar">

<h2>Utrux Search</h2>

<button class="back-btn" onclick="goBack()">
🏠 بازگشت
</button>

</div>

<div class="search-box">

<input
id="query"
placeholder="جستجو...">

<button onclick="search()">
جستجو
</button>

</div>

<div class="status" id="status"></div>

</div>

<div id="results"></div>

<script>

const API_KEY = "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";
const PEXELS_API_KEY = "LBX1wKWqpXvrZQLXA6xbDaZ376NBhcDZmPAAgBeKyFNF5FtYlpYRBeXw";
const params =
new URLSearchParams(window.location.search);

const firstQuery =
params.get("q");

if(firstQuery){

document.getElementById("query").value =
firstQuery;

search();
}

function goBack(){

window.location.href =
"https://utruc.github.io/browser/";

}

document
.getElementById("query")
.addEventListener("keydown",e=>{

if(e.key==="Enter"){

search();

}

});

async function search(){

const query =
document.getElementById("query").value.trim();

if(!query) return;

const results =
document.getElementById("results");

const status =
document.getElementById("status");

status.innerText =
"در حال جستجو...";

results.innerHTML =
'<div class="loading">در حال دریافت نتایج...</div>';

try{

const response =
await fetch(
"https://api.tavily.com/search",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
api_key:API_KEY,
query:query,
search_depth:"basic",
max_results:10
})
}
);

console.log(response.status);
console.log(response);

    
const data =
await response.json();

    const pexelsResponse = await fetch(
`https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=12`,
{
headers:{
Authorization:PEXELS_API_KEY
}
}
);

const pexelsData =
await pexelsResponse.json();

results.innerHTML = "";

    const imagesDiv =
document.getElementById("images");

imagesDiv.innerHTML = "";

if(
pexelsData.photos &&
pexelsData.photos.length
){

pexelsData.photos.forEach(photo=>{

imagesDiv.innerHTML += `

<a href="${photo.url}"
target="_blank">

<img src="${photo.src.large}">

</a>

`;

});

}

status.innerText =
"نتایج برای: " + query;

if(!data.results ||
!data.results.length){

results.innerHTML =
'<div class="error">نتیجه‌ای پیدا نشد.</div>';

return;
}

data.results.forEach(item=>{

results.innerHTML += `

<div class="result">

<a href="${item.url}"
target="_blank">

${item.title}

</a>

<p>

${item.content || ""}

</p>

<small>

${item.url}

</small>

</div>

`;

});

catch(error){

    console.error("ERROR:", error);

    resultsDiv.innerHTML =
    "<h3>خطا در اتصال به API</h3>";
}  
</script>

</body>
