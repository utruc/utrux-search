<!DOCTYPE html>

<html lang="fa" dir="rtl">
<head>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Utrux Search</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Tahoma,sans-serif;

background:
radial-gradient(circle at center,
#1e3a8a 0%,
#081229 35%,
#020617 100%);

min-height:100vh;

color:white;

}

.container{

width:100%;

padding:20px 40px;

}

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

}

.logo{

font-size:34px;

font-weight:bold;

}

.back-btn{

background:#2563eb;

color:white;

border:none;

padding:12px 18px;

border-radius:12px;

cursor:pointer;

font-size:16px;

}

.back-btn:hover{

background:#3b82f6;

}

.search-area{

width:100%;

display:flex;

gap:10px;

}

.search-input{

flex:1;

height:55px;

border:none;

outline:none;

border-radius:15px;

padding:0 18px;

font-size:18px;

background:rgba(255,255,255,.1);

color:white;

backdrop-filter:blur(20px);

}

.search-input::placeholder{

color:#cbd5e1;

}

.search-btn{

width:120px;

border:none;

border-radius:15px;

background:#2563eb;

color:white;

font-size:16px;

cursor:pointer;

}

.search-btn:hover{

background:#3b82f6;

}

.info{

margin-top:25px;

color:#cbd5e1;

font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<div class="topbar">

<div class="logo">
Utrux Search
</div>

<button
class="back-btn"
onclick="window.location.href='https://utruc.github.io/browser/'">

🏠 بازگشت

</button>

</div>

<div class="search-area">

<input
id="searchInput"
class="search-input"
type="text"
placeholder="جستجو در گوگل...">

<button
class="search-btn"
onclick="doSearch()">

جستجو

</button>

</div>

<div class="info">
نتایج جستجو مستقیماً در گوگل باز می‌شوند.
</div>

</div>

<script>

const params =
new URLSearchParams(
window.location.search
);

const q =
params.get("q");

const input =
document.getElementById(
"searchInput"
);

if(q){

input.value = q;

window.location.href =
"https://www.google.com/search?q=" +
encodeURIComponent(q);

}

function doSearch(){

const text =
input.value.trim();

if(!text) return;

window.location.href =
"https://www.google.com/search?q=" +
encodeURIComponent(text);

}

input.addEventListener(
"keydown",
function(e){

if(e.key==="Enter"){

doSearch();

}

}
);

if("serviceWorker" in navigator){

navigator.serviceWorker.register(
"sw.js"
);

}

</script>

</body>
</html>
